[DEFAULT]
maintainer = University of Chicago

registry = ghcr.io
namespace = chameleoncloud/kolla
openstack_release = 2023.1
tag = 2023.1
type = source
base = ubuntu
base_tag = "22.04"
base_arch = x86_64
platform = linux/amd64

[profiles]

keystone = ^keystone
ironic = ^ironic
nova = ^nova
neutron = ^neutron
blazar = ^blazar
heat = ^heat
horizon = ^horizon


[keystone-base]
type = local
location = sources/keystone

[blazar-base]
type = local
location = sources/blazar

[blazar-manager-additions-extra]
type = local
location = blazar/additions/blazar-manager

# skipping temp TODO
