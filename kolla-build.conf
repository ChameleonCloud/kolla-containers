location = sources/heat

[horizon]
type = local
location = sources/horizon

[horizon-additions-theme-chameleoncloud]
type = local
location = sources/horizon-theme

[horizon-plugin-blazar-dashboard]
type = local
location = sources/blazar-dashboard

[horizon-plugin-heat-dashboard]
type = local
location = sources/heat-dashboard

