[DEFAULT]
maintainer = University of Chicago

registry = ghcr.io
namespace = chameleoncloud/kolla
openstack_release = 2023.1
tag = 2023.1
type = source
base = ubuntu
base_tag = "22.04"
base_arch = x86_64
platform = linux/amd64

[profiles]
blazar = ^blazar
cinder = ^cinder-
doni = ^doni-
glance = ^glance-
heat = ^heat
horizon = ^horizon
ironic = ^ironic
keystone = ^keystone
manila = ^manila-
neutron = ^neutron
nova = ^nova
placement = ^placement
tunelo = ^tunelo-
zun = ^zun-
prometheus = ^prometheus-


[keystone-base]
type = local
location = $locals_base/keystone

[blazar-base]
type = local
location = $locals_base/blazar

[blazar-manager-additions-extra]
type = local
location = blazar/additions/blazar-manager

[doni-base]
type = local
location = $locals_base/doni


[heat-base]
type = local
location = $locals_base/heat

[horizon]
type = local
location = $locals_base/horizon

[horizon-additions-theme-chameleoncloud]
type = local
location = $locals_base/horizon-theme

[horizon-plugin-blazar-dashboard]
type = local
location = $locals_base/blazar-dashboard

[horizon-plugin-heat-dashboard]
type = local
location = $locals_base/heat-dashboard

# [neutron-server-additions-extra]
# type = local
# location = neutron/additions/neutron-server

[nova-base]
type = local
location = $locals_base/nova

[nova-base-plugin-blazar]
type = local
location = $locals_base/blazar-nova
